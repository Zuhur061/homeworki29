<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreateX</title>
  <link rel="stylesheet" href="./src/output.css">
</head>
<body class="bg-[#FEEAE5] font-sans">
  <header class="max-w-[1200px] mx-auto flex items-center justify-between py-6 px-5 bg-[#FEEAE5] font-sans">
    <div class="flex items-center gap-14">
      <h1 class="text-3xl font-bold text-[#1E1E2F]">
        CREATE<span class="text-orange-500">X</span>
      </h1>
      <nav class="hidden lg:flex items-center gap-8 text-[15px] font-medium text-[#424551]">
        <a href="#">About Us</a>
        <a href="#">Courses</a>
        <a href="#">Events</a>
        <a href="#">Blog</a>
        <a href="#">Contacts</a>
      </nav>
    </div>
    <div class="flex items-center gap-5">
      <button class="hidden md:block bg-orange-500 text-white font-semibold px-7 py-3 rounded-md">
        Get consultation
      </button>
      <a href="#" class="text-[#424551] font-medium">
        Log in / Register
      </a>
    </div>
  </header>
  <section class="max-w-[1200px] mx-auto px-5 py-16 bg-[#FEEAE5] font-sans">
    <div class="grid lg:grid-cols-2 gap-16 items-center">
      <div>
        <div class="flex items-center gap-4 mb-10">
          <div class="w-16 h-16 rounded-full bg-[#ffdad3] flex items-center justify-center shadow-lg">
            <div class="w-12 h-12 rounded-full bg-orange-500 flex items-center justify-center text-white text-xl">
              ▶
            </div>
          </div>
          <p class="font-semibold text-[#1E1E2F]">
            Play showreel
          </p>
        </div>
        <h1 class="text-[#1E1E2F] text-5xl md:text-7xl font-bold leading-tight mb-10">
          Enjoy studying <br>
          with Createx <br>
          Online Courses
        </h1>
        <div class="flex flex-wrap gap-5">
          <button class="border-2 border-orange-500 text-orange-500 px-8 py-4 rounded-md font-semibold">
            About us
          </button>
          <button class="bg-orange-500 text-white px-8 py-4 rounded-md font-semibold shadow-lg">
            Explore courses
          </button>
        </div>
      </div>
      <div class="relative flex justify-center">
        <div class="absolute top-0 right-10 w-40 h-40 bg-yellow-300 rounded-[40px] rotate-12"></div>
        <div class="relative z-10">
          <img 
            src="./imgs/illustration.png" 
            alt="student"
            class="w-full max-w-[520px]"/>
        </div>
      </div>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-10 mt-24">
      <div class="flex items-center gap-3">
        <h2 class="text-5xl font-bold text-[#1E1E2F]">1200</h2>
        <p class="text-[#424551]">Students graduated</p>
      </div>
      <div class="flex items-center gap-3">
        <h2 class="text-5xl font-bold text-[#1E1E2F]">84</h2>
        <p class="text-[#424551]">Completed courses</p>
      </div>
      <div class="flex items-center gap-3">
        <h2 class="text-5xl font-bold text-[#1E1E2F]">16</h2>
        <p class="text-[#424551]">Qualified tutors</p>
      </div>
      <div class="flex items-center gap-3">
        <h2 class="text-5xl font-bold text-[#1E1E2F]">5</h2>
        <p class="text-[#424551]">Years of experience</p>
      </div>
    </div>
  </section>










  
</body>
</html>
