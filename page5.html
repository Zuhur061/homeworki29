<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>
    <header class="max-w-[1200px] mx-auto flex items-center justify-between py-6 px-5 font-sans">
    <div class="flex items-center gap-14">
      <h1 class="text-3xl font-bold text-[#1E1E2F]">
        CREATE<span class="text-orange-500">X</span>
      </h1>
      <nav class="hidden lg:flex items-center gap-8 text-[15px] font-medium text-[#424551]">
        <a href="#">About Us</a>
        <a href="#">Courses</a>
        <a href="#">Events</a>
        <a href="#">Blog</a>
        <a href="#">Contacts</a>
      </nav>
    </div>
    <div class="flex items-center gap-5">
      <button class="hidden md:block bg-orange-500 text-white font-semibold px-7 py-3 rounded-md">
        Get consultation
      </button>
      <a href="#" class="text-[#424551] font-medium">
        Log in / Register
      </a>
    </div>
  </header>
  <section class="max-w-6xl mx-auto py-20 flex items-start justify-between gap-20">
  <div class="w-1/2">
    <p class="text-sm font-semibold tracking-widest text-gray-500 uppercase mb-4">
      Contact Info
    </p>
    <h2 class="text-5xl font-bold text-gray-900 mb-12">
      Get in touch
    </h2>
    <div class="space-y-10 mb-14">
      <div>
        <p class="text-gray-500 mb-2">
          Talk to us:
        </p>
        <p class="text-2xl font-medium text-gray-900">
          hello@createx.com
        </p>
      </div>
      <div>
        <p class="text-gray-500 mb-2">
          Call us:
        </p>
        <p class="text-2xl font-medium text-gray-900">
          (405) 555-0128
        </p>
      </div>
      <div>
        <p class="text-gray-500 mb-2">
          Address:
        </p>
        <p class="text-xl text-gray-900 leading-9">
          2464 Royal Ln. Mesa, New Jersey 45463, USA
        </p>
      </div>
    </div>
    <div>
      <p class="text-sm font-semibold tracking-widest text-gray-500 uppercase mb-6">
        Follow us:
      </p>
      <div class="flex gap-8 text-2xl text-gray-600">
        <span>f</span>
        <span>t</span>
        <span>y</span>
        <span>tg</span>
        <span>ig</span>
        <span>in</span>
      </div>
    </div>
  </div>
  <div class="w-1/2">
    <img 
      src="./imgs/map (1).png"
      alt=""
      class="w-full h-[500px] object-cover">
  </div>
</section>
<section class="w-full min-h-screen bg-[#f7f7f7] flex items-center justify-center py-16 px-6">
  <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-14 items-center">
    <div class="flex justify-center">
      <img 
        src="./imgs/illustration (8).png" 
        alt=""
        class="w-full max-w-md object-contain select-none pointer-events-none">
    </div>
    <div class="w-full">
      <p class="uppercase tracking-[3px] text-sm text-gray-500 mb-2">
        Any Questions?
      </p>
      <h2 class="text-5xl font-bold text-black mb-10">
        Drop us a line
      </h2>
      <form class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm text-gray-700 mb-2">
              First Name*
            </label>
            <input 
              type="text"
              placeholder="Your first name"
              class="w-full h-14 px-4 border border-gray-200 bg-white outline-none focus:border-orange-500 transition-all duration-300">
          </div>
          <div>
            <label class="block text-sm text-gray-700 mb-2">
              Last Name*
            </label>
            <input 
              type="text"
              placeholder="Your last name"
              class="w-full h-14 px-4 border border-gray-200 bg-white outline-none focus:border-orange-500 transition-all duration-300">
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm text-gray-700 mb-2">
              Email*
            </label>
            <input 
              type="email"
              placeholder="Your working email"
              class="w-full h-14 px-4 border border-gray-200 bg-white outline-none focus:border-orange-500 transition-all duration-300">
          </div>
          <div>
            <label class="block text-sm text-gray-700 mb-2">
              Phone
            </label>
            <input 
              type="text"
              placeholder="Your phone number"
              class="w-full h-14 px-4 border border-gray-200 bg-white outline-none focus:border-orange-500 transition-all duration-300">
          </div>
        </div>
        <div>
          <label class="block text-sm text-gray-700 mb-2">
            Message*
          </label>
          <textarea 
            placeholder="Your message"
            class="w-full h-40 p-4 border border-gray-200 bg-white outline-none resize-none focus:border-orange-500 transition-all duration-300"></textarea>
        </div>
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 pt-2">
          <label class="flex items-start gap-3 text-sm text-gray-600 cursor-pointer">
            <input 
              type="checkbox"
              class="mt-1 accent-orange-500">
            <span>
              I agree to receive communications from <br>
              Createx Online School
            </span>
          </label>
          <button 
            type="submit"
            class="bg-orange-500 hover:bg-orange-600 active:scale-95 transition-all duration-300 text-white font-medium px-14 h-14">
            Send message
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
</body>
</html>
